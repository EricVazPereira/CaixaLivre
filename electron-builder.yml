appId: br.com.caixalivre
productName: CaixaLivre
copyright: Copyright © 2025 CaixaLivre
icon: build/icon.ico

directories:
  output: release

# ── Apenas idiomas necessários (~10 MB a menos de locale paks) ───────────────
electronLanguages:
  - pt-BR
  - en-US

# ── O que vai DENTRO do asar (código do processo principal) ───────────────────
files:
  - electron/**
  - package.json
  - "!src/**"
  - "!backend/**"
  - "!dist/**"
  - "!scripts/**"
  - "!release/**"
  - "!node_modules/**"

# ── Recursos fora do asar (backend, frontend compilado, configuração) ─────────
extraResources:
  # Backend completo com node_modules
  # Exclui artefatos de compilação e debug que não servem em produção
  - from: backend
    to: backend
    filter:
      - "**/*"
      - "!node_modules/.cache/**"
      - "!**/*.map"
      - "!**/*.pdb"
      - "!**/*.obj"
      - "!**/*.iobj"
      - "!**/*.ipdb"
      - "!**/*.exp"
      - "!**/*.lib"

  # Frontend React compilado (servido pelo Express como static)
  - from: dist
    to: dist

# Arquivos ao lado do executável — editáveis pelo técnico sem abrir resources/
extraFiles:
  - from: Network.ini
    to: Network.ini
  # Pasta de imagens ao lado do .exe — técnico pode substituir logo.bmp sem recompilar
  - from: img
    to: img

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  # Função de assinatura no-op: evita download do winCodeSign (requer symlinks / admin no Windows)
  sign: scripts/no-sign.cjs
  target:
    - target: nsis
      arch: [x64]
    - target: dir
      arch: [x64]

compression: maximum

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  installerLanguages: [pt_BR]
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CaixaLivre
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

afterPack: scripts/after-pack.cjs

publish: null
