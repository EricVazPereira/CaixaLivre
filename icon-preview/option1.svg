<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06121F"/>
      <stop offset="100%" stop-color="#0A2E4E"/>
    </linearGradient>
    <linearGradient id="beam" x1="55" y1="0" x2="462" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#008BC3" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#008BC3"/>
      <stop offset="72%"  stop-color="#00CD2B"/>
      <stop offset="100%" stop-color="#00CD2B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow top-right -->
  <ellipse cx="400" cy="100" rx="220" ry="160" fill="rgba(0,139,195,0.06)"/>

  <!-- Cart: top rail -->
  <line x1="95"  y1="158" x2="358" y2="158" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Handle extension (slightly translucent to show depth) -->
  <line x1="358" y1="158" x2="432" y2="158" stroke="rgba(255,255,255,0.6)" stroke-width="22" stroke-linecap="round"/>
  <!-- Left front arm (diagonal) -->
  <line x1="95"  y1="158" x2="126" y2="198" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Right arm down to basket -->
  <line x1="358" y1="158" x2="358" y2="198" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Basket: left, bottom, right sides -->
  <polyline points="126,198 146,314 366,314 358,198"
    stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wheels -->
  <circle cx="205" cy="358" r="27" stroke="white" stroke-width="20"/>
  <circle cx="332" cy="358" r="27" stroke="white" stroke-width="20"/>

  <!-- Scan beam — glow halo -->
  <rect x="55" y="236" width="410" height="44" rx="22" fill="url(#beam)" opacity="0.22"/>
  <!-- Scan beam — core line -->
  <rect x="55" y="248" width="410" height="14" rx="7" fill="url(#beam)"/>

  <!-- Right endpoint indicator -->
  <circle cx="462" cy="255" r="20" fill="#00CD2B" opacity="0.18"/>
  <circle cx="462" cy="255" r="10" fill="#00CD2B"/>
</svg>
